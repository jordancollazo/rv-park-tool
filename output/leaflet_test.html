<!DOCTYPE html>
<html>

<head>
    <title>Minimal Leaflet Test</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #map {
            height: 100%;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script>
        console.log('Starting minimal test...');
        console.log('Leaflet L object:', typeof L);

        var map = L.map('map').setView([27.6, -81.5], 7);
        console.log('Map created:', map);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
        console.log('Tile layer added');

        // Add a marker to confirm things work
        L.marker([27.6, -81.5]).addTo(map).bindPopup('Test marker!').openPopup();
        console.log('Marker added - if you see this popup, Leaflet is working!');
    </script>
</body>

</html>
