<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHP Opportunity Zones - Florida</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #1e293b;
            padding: 1rem 2rem;
            border-bottom: 1px solid #334155;
        }

        .header h1 {
            font-size: 1.5rem;
            color: #a855f7;
        }

        .controls {
            background: #1e293b;
            padding: 0.75rem 2rem;
            border-bottom: 1px solid #334155;
        }

        .toggle-btn {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: 1px solid #475569;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            margin-right: 0.5rem;
        }

        .toggle-btn.active {
            background: #9333ea;
            color: white;
            border-color: transparent;
        }

        /* CRITICAL: This is the key difference from the failing version */
        .map-container {
            flex: 1;
            display: flex;
            min-height: 0;
            /* CRITICAL for flex shrinking */
        }

        #map {
            flex: 1;
            /* NO height: 100% - let flex handle it */
        }

        .sidebar {
            width: 280px;
            background: #1e293b;
            padding: 1rem;
            border-left: 1px solid #334155;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>📍 MHP Opportunity Zones - Florida (Minimal Debug)</h1>
    </div>
    <div class="controls">
        <button class="toggle-btn active">🎯 Opportunity Score</button>
        <button class="toggle-btn">📍 Leads</button>
    </div>
    <div class="map-container">
        <div id="map"></div>
        <div class="sidebar">
            <h3 style="color:#f1f5f9">Debug Panel</h3>
            <p style="color:#94a3b8;margin-top:1rem">
                Leads: 3<br>
                Zones: 2
            </p>
        </div>
    </div>

    <script>
        console.log('Initializing minimal debug map...');

        // Initialize map with OpenStreetMap tiles (known working)
        var map = L.map('map').setView([27.616666666666664, -81.54], 7);
        console.log('Map object created');

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
        console.log('Tile layer added');

        // Add lead markers
        const leads = [{"latitude": 27.65, "longitude": -81.5, "name": "Test Lead 1"}, {"latitude": 27.62, "longitude": -81.52, "name": "Test Lead 2"}, {"latitude": 27.58, "longitude": -81.6, "name": "Test Lead 3"}];
        
        leads.forEach(function(d) {
            if (d.latitude && d.longitude) {
                 L.marker([d.latitude, d.longitude])
                    .addTo(map)
                    .bindPopup(d.name || 'Unknown');
            }
        });
        console.log('Markers added');

        // Force size recalculation
        setTimeout(function () {
            map.invalidateSize();
            console.log('Map size invalidated');
        }, 100);
    </script>
</body>
</html>
