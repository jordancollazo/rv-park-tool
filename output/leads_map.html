<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jacksonville, FL MHP/RV Leads</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 1rem 2rem;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stats {
            display: flex;
            gap: 1.5rem;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
        }
        .stat.hot .stat-value { color: #f87171; }
        .stat.warm .stat-value { color: #fbbf24; }
        .stat.cold .stat-value { color: #4ade80; }
        .controls {
            background: #1e293b;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            border-bottom: 1px solid #334155;
        }
        .controls label {
            font-size: 0.875rem;
            color: #94a3b8;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        input[type="range"] {
            width: 200px;
            accent-color: #60a5fa;
        }
        .score-display {
            background: #334155;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            min-width: 80px;
            text-align: center;
        }
        .legend {
            display: flex;
            gap: 1rem;
            margin-left: auto;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        #map {
            height: calc(100vh - 130px);
            width: 100%;
        }
        .leaflet-popup-content-wrapper {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .leaflet-popup-tip {
            background: #1e293b;
        }
        .popup-content {
            min-width: 250px;
            padding: 0.5rem;
        }
        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }
        .popup-name {
            font-size: 1rem;
            font-weight: 600;
            color: #f1f5f9;
            margin-right: 0.5rem;
        }
        .popup-score {
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .popup-row {
            display: flex;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }
        .popup-label {
            color: #64748b;
            min-width: 70px;
        }
        .popup-value {
            color: #cbd5e1;
        }
        .popup-value a {
            color: #60a5fa;
            text-decoration: none;
        }
        .popup-value a:hover {
            text-decoration: underline;
        }
        .popup-reasons {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid #334155;
            font-size: 0.8rem;
            color: #94a3b8;
            font-style: italic;
        }
        .popup-actions {
            margin-top: 0.75rem;
            display: flex;
            gap: 0.5rem;
        }
        .popup-btn {
            flex: 1;
            padding: 0.5rem;
            border-radius: 6px;
            text-decoration: none;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .popup-btn.maps {
            background: #3b82f6;
            color: white;
        }
        .popup-btn.maps:hover {
            background: #2563eb;
        }
        .popup-btn.website {
            background: #334155;
            color: #e2e8f0;
        }
        .popup-btn.website:hover {
            background: #475569;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏕️ Jacksonville, FL MHP/RV Leads</h1>
        <div class="stats">
            <div class="stat hot">
                <div class="stat-value">1</div>
                <div class="stat-label">Hot (≤3)</div>
            </div>
            <div class="stat warm">
                <div class="stat-value">0</div>
                <div class="stat-label">Warm (4-6)</div>
            </div>
            <div class="stat cold">
                <div class="stat-value">7</div>
                <div class="stat-label">Cold (7+)</div>
            </div>
        </div>
    </div>
    <div class="controls">
        <div class="filter-group">
            <label>Max Score:</label>
            <input type="range" id="scoreFilter" min="1" max="10" value="10">
            <span class="score-display" id="scoreValue">≤ 10</span>
        </div>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot" style="background: #dc2626;"></div>
                <span>1-2 (Hot)</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #f97316;"></div>
                <span>3-4</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #eab308;"></div>
                <span>5-6</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #22c55e;"></div>
                <span>7-8</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #16a34a;"></div>
                <span>9-10 (Cold)</span>
            </div>
        </div>
    </div>
    <div id="map"></div>
    
    <script>
        const markersData = [{"lat": 30.3237463, "lng": -81.7745687, "name": "The Meadows Manufactured Home Community", "address": "7667 W Beaver St, Jacksonville, FL 32220", "phone": "(904) 274-3608", "website": "https://www.mhvillage.com/parks/6660", "mapsUrl": "https://www.google.com/maps/place/?q=place_id:ChIJTdBES1O55YgRf3e-ZVTQFyE", "rating": 3.8, "reviews": 45, "score": 3, "reasons": "Aggregator/directory listing only", "color": "#f97316"}, {"lat": 30.4634299, "lng": -81.6746401, "name": "Love's RV Hookup", "address": "12921 Duval Rd, Jacksonville, FL 32218", "phone": "(904) 330-3011", "website": "https://www.camplife.com/campground/Love%2527s+RV+Hookup-Jacksonville+Duvall+FL+828?utm_source=google&utm_medium=organic&utm_campaign=maps", "mapsUrl": "https://www.google.com/maps/place/?q=place_id:ChIJu-RQfUyv5YgRcpW_6e7sqXk", "rating": 3.8, "reviews": 43, "score": 7, "reasons": "Missing H1; Phone not visible on homepage; Email not visible; No obvious contact page link", "color": "#22c55e"}, {"lat": 30.271716, "lng": -81.621294, "name": "Fleetwood RV Park", "address": "5001 Philips Hwy, Jacksonville, FL 32207", "phone": "(904) 737-4733", "website": "https://www.fleetwoodrvparkfl.com/", "mapsUrl": "https://www.google.com/maps/place/?q=place_id:ChIJOWQDRhe25YgRDJ-iD8ghEu0", "rating": 4.1, "reviews": 244, "score": 10, "reasons": "Good overall", "color": "#16a34a"}, {"lat": 30.5172362, "lng": -81.6391419, "name": "Pecan park rv resort", "address": "650 Pecan Park Rd Office, Jacksonville, FL 32218", "phone": "(904) 751-6770", "website": "https://www.sunoutdoors.com/florida/pecan-park-rv-community", "mapsUrl": "https://www.google.com/maps/place/?q=place_id:ChIJMf1HTQCv5YgRYQtGD11Ie1w", "rating": 4.9, "reviews": 7, "score": 10, "reasons": "Good overall", "color": "#16a34a"}, {"lat": 30.5172362, "lng": -81.6391419, "name": "Pecan Park", "address": "650 Pecan Park Rd, Jacksonville, FL 32218", "phone": "(904) 751-6770", "website": "https://www.sunoutdoors.com/florida/pecan-park-rv-community?utm_source=google&utm_medium=organic&utm_campaign=gbp_listing", "mapsUrl": "https://www.google.com/maps/place/?q=place_id:ChIJe2Sfutyu5YgRlmtCztmvNlg", "rating": 4.3, "reviews": 841, "score": 10, "reasons": "Good overall", "color": "#16a34a"}, {"lat": 30.3774891, "lng": -81.4041668, "name": "Osprey Cove RV Park", "address": "2285 England Ct E, Jacksonville, FL 32228", "phone": "(904) 270-7808", "website": "https://www.navymwrmayport.com/programs/5003cca3-ba5a-44dd-af6b-5435e193860e", "mapsUrl": "https://www.google.com/maps/place/?q=place_id:ChIJgw7ERIxO5IgR24XzdSBZocM", "rating": 4.6, "reviews": 127, "score": 9, "reasons": "Missing meta description", "color": "#16a34a"}, {"lat": 30.4562435, "lng": -81.7083067, "name": "Flamingo Lake", "address": "3640 Newcomb Rd, Jacksonville, FL 32218", "phone": "(904) 766-0672", "website": "https://www.sunoutdoors.com/florida/flamingo-lake-rv-community?utm_source=google&utm_medium=organic&utm_campaign=gbp_listing", "mapsUrl": "https://www.google.com/maps/place/?q=place_id:ChIJZ5uQKkml5YgR2VF6cgIgnvQ", "rating": 4.3, "reviews": 1466, "score": 10, "reasons": "Good overall", "color": "#16a34a"}, {"lat": 30.4710087, "lng": -81.6184824, "name": "Oceanway Village", "address": "Lot 111, 489 Starratt Rd, Jacksonville, FL 32218", "phone": "(904) 696-2550", "website": "https://yescommunities.com/community/oceanway-village", "mapsUrl": "https://www.google.com/maps/place/?q=place_id:ChIJs60ZTGyu5YgRj7A8aM2NxDs", "rating": 3.8, "reviews": 256, "score": 8, "reasons": "Missing meta description; Email not visible", "color": "#22c55e"}];
        
        // Initialize map
        const map = L.map('map').setView([30.4247632375, -81.63496781250001], 8);
        
        // Add dark tile layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            maxZoom: 19
        }).addTo(map);
        
        // Store markers for filtering
        const markers = [];
        
        // Create markers
        markersData.forEach(data => {
            const marker = L.circleMarker([data.lat, data.lng], {
                radius: 10,
                fillColor: data.color,
                color: '#ffffff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            });
            
            marker.score = data.score;
            
            // Build popup content
            let popupHtml = `
                <div class="popup-content">
                    <div class="popup-header">
                        <span class="popup-name">${data.name}</span>
                        <span class="popup-score" style="background: ${data.color}; color: white;">
                            ${data.score}/10
                        </span>
                    </div>
                    <div class="popup-row">
                        <span class="popup-label">Address:</span>
                        <span class="popup-value">${data.address}</span>
                    </div>
            `;
            
            if (data.phone) {
                popupHtml += `
                    <div class="popup-row">
                        <span class="popup-label">Phone:</span>
                        <span class="popup-value"><a href="tel:${data.phone}">${data.phone}</a></span>
                    </div>
                `;
            }
            
            if (data.rating) {
                popupHtml += `
                    <div class="popup-row">
                        <span class="popup-label">Rating:</span>
                        <span class="popup-value">⭐ ${data.rating} (${data.reviews} reviews)</span>
                    </div>
                `;
            }
            
            if (data.reasons) {
                popupHtml += `<div class="popup-reasons">${data.reasons}</div>`;
            }
            
            popupHtml += `<div class="popup-actions">`;
            if (data.mapsUrl) {
                popupHtml += `<a href="${data.mapsUrl}" target="_blank" class="popup-btn maps">📍 Google Maps</a>`;
            }
            if (data.website) {
                popupHtml += `<a href="${data.website}" target="_blank" class="popup-btn website">🌐 Website</a>`;
            }
            popupHtml += `</div></div>`;
            
            marker.bindPopup(popupHtml, { maxWidth: 350 });
            marker.addTo(map);
            markers.push(marker);
        });
        
        // Score filter
        const scoreFilter = document.getElementById('scoreFilter');
        const scoreValue = document.getElementById('scoreValue');
        
        scoreFilter.addEventListener('input', function() {
            const maxScore = parseInt(this.value);
            scoreValue.textContent = '≤ ' + maxScore;
            
            markers.forEach(marker => {
                if (marker.score <= maxScore) {
                    marker.addTo(map);
                } else {
                    marker.remove();
                }
            });
        });
        
        // Fit bounds to markers
        if (markers.length > 0) {
            const group = L.featureGroup(markers);
            map.fitBounds(group.getBounds().pad(0.1));
        }
    </script>
</body>
</html>
